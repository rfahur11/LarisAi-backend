version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: larisai-pos-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: larisai
    volumes:
      - mongodb_pos_data:/data/db
    networks:
      - pos-net

  pos-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: larisai-pos-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=larisai_pos
    depends_on:
      - mongodb
    networks:
      - pos-net

networks:
  pos-net:
    driver: bridge

volumes:
  mongodb_pos_data:
